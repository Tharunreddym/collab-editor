name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ── Server tests ──────────────────────────────────────────
  server:
    name: Server
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       collab_test
          POSTGRES_USER:     collab
          POSTGRES_PASSWORD: collab
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 10

    defaults:
      run:
        working-directory: server

    env:
      NODE_ENV:     test
      DATABASE_URL: postgres://collab:collab@localhost:5432/collab_test
      REDIS_URL:    redis://localhost:6379
      JWT_SECRET:   ci-test-secret
      PORT:         4000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - run: npm ci

      - name: Run migrations
        run: node src/db/migrate.js

      - name: Lint
        run: npx eslint src --ext .js --max-warnings 0 || true

  # ── Client build ──────────────────────────────────────────
  client:
    name: Client build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - run: npm ci

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist
          retention-days: 7

  # ── Docker build check ────────────────────────────────────
  docker:
    name: Docker compose build
    runs-on: ubuntu-latest
    needs: [server, client]

    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: docker compose build
