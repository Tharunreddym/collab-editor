# railway.toml
# Deploy the Node.js server on Railway.
# Add a PostgreSQL and Redis plugin from the Railway dashboard,
# then Railway will inject DATABASE_URL and REDIS_URL automatically.

[build]
builder = "NIXPACKS"
buildCommand = "cd server && npm install"

[deploy]
startCommand = "cd server && npm run migrate && node src/index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "server"

[services.variables]
NODE_ENV  = "production"
PORT      = "4000"
# Set JWT_SECRET and CLIENT_URL in the Railway dashboard → Variables
