services:
  - type: web
    name: collab-editor-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm run migrate && node src/index.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: collab-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: collab-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://collab-editor-client.onrender.com
      - key: PORT
        value: "10000"

  - type: web
    name: collab-editor-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      - key: VITE_WS_URL
        value: wss://collab-editor-server.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: redis
    name: collab-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: collab-db
    plan: free